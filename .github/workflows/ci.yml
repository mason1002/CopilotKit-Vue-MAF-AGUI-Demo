name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  direct-integration:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
      - name: Build Vue
        shell: pwsh
        run: |
          Set-Location frontend
          npm ci
          npm run build
      - name: Test Direct Integration
        shell: pwsh
        run: .\scripts\test-direct.ps1